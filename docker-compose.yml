services:
  postgres:
    image: postgres:16-alpine
    container_name: clientpad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clientpad
      POSTGRES_PASSWORD: clientpad
      POSTGRES_DB: clientpad
    ports:
      - "5432:5432"
    volumes:
      - clientpad-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clientpad -d clientpad"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  clientpad-postgres-data:
