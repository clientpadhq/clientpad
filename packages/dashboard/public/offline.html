<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClientPad Offline</title>
    <style>
      body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#fff;color:#111827;display:grid;min-height:100vh;place-items:center;padding:24px}
      main{max-width:420px;border:1px solid #dbe2ea;border-radius:10px;padding:24px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
      h1{margin:0 0 10px;font-size:24px}p{margin:0;color:#526071;line-height:1.5}.dot{width:12px;height:12px;border-radius:50%;background:#0b8d4d;display:inline-block;margin-right:8px}
    </style>
  </head>
  <body><main><h1><span class="dot"></span>ClientPad is offline</h1><p>The app shell is cached. Reconnect to sync WhatsApp messages, payments, usage, and billing data.</p></main></body>
</html>
