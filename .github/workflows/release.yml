name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build, Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @clientpad/core build
          pnpm --filter @clientpad/sdk build
          pnpm --filter @clientpad/whatsapp build
          pnpm --filter @clientpad/server build
          pnpm --filter @clientpad/cloud build

      - name: Pack tarballs
        run: |
          mkdir -p dist
          pnpm --filter @clientpad/core pack --pack-destination dist
          pnpm --filter @clientpad/cli pack --pack-destination dist
          pnpm --filter @clientpad/sdk pack --pack-destination dist
          pnpm --filter @clientpad/server pack --pack-destination dist
          pnpm --filter @clientpad/whatsapp pack --pack-destination dist
          pnpm --filter @clientpad/cloud pack --pack-destination dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tgz
          fail_on_unmatched_files: false

      - name: Publish @clientpad/core
        run: pnpm --filter @clientpad/core publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clientpad/cli
        run: pnpm --filter @clientpad/cli publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clientpad/sdk
        run: pnpm --filter @clientpad/sdk publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clientpad/server
        run: pnpm --filter @clientpad/server publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clientpad/whatsapp
        run: pnpm --filter @clientpad/whatsapp publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @clientpad/cloud
        run: pnpm --filter @clientpad/cloud publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
